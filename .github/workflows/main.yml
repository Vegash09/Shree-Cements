name: Declarative Automation Bundles

on:
  push:
    branches:
      - dev
      - prod
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read

# ══════════════════════════════════════════════════════════════
# JOB 1 – Validate
# ══════════════════════════════════════════════════════════════
jobs:
  validate:
    name: Validate declarative automation bundles
    runs-on: ubuntu-latest
    continue-on-error: false
    env:
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      DATABRICKS_HOST_DEV: ${{ secrets.DATABRICKS_HOST_DEV }}
      DATABRICKS_HOST_PROD: ${{ secrets.DATABRICKS_HOST_PROD }}
      TARGET: ${{ github.event.inputs.target || github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Ensure .py files are Databricks notebooks
        shell: pwsh
        run: |
          Get-ChildItem -Path "${{ github.workspace }}" -Filter "*.py" -Recurse | ForEach-Object {
            ("# Databricks notebook source`n" + (Get-Content $_.FullName -Raw)) | Set-Content $_.FullName
          }

      - name: Create databricks.yml
        run: |
          cat <<'EOF' > databricks.yml
          bundle:
            name: pharma_dabs

          include:
            - src/*.yml
            - src/*/*.yml

          sync:
            exclude:
              - ".github"
              - "databricks.yml"

          targets:
            dev:
              mode: development
              default: true
              workspace:
                host: '${{ secrets.DATABRICKS_HOST_DEV }}'
                root_path: '/dbx'
              permissions:
                - user_name: sce21cs004@sairamtap.edu.in
                  level: CAN_RUN
                - service_principal_name: ${{ secrets.DATABRICKS_CLIENT_ID }}
                  level: CAN_MANAGE
            prod:
              mode: production
              workspace:
                host: '${{ secrets.DATABRICKS_HOST_PROD }}'
                root_path: '/dbx'
              permissions:
                - user_name: sce21cs004@sairamtap.edu.in
                  level: CAN_RUN
                - service_principal_name: ${{ secrets.DATABRICKS_CLIENT_ID }}
                  level: CAN_MANAGE
          EOF

      - name: Validate bundle
        run: databricks bundle validate -t ${{ env.TARGET }}

# ══════════════════════════════════════════════════════════════
# JOB 2 – Deploy
# ══════════════════════════════════════════════════════════════
  deploy:
    name: Deploy declarative automation bundles
    needs: validate
    if: ${{ needs.validate.result == 'success' }}
    runs-on: ubuntu-latest
    continue-on-error: false
    env:
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      DATABRICKS_HOST_DEV: ${{ secrets.DATABRICKS_HOST_DEV }}
      DATABRICKS_HOST_PROD: ${{ secrets.DATABRICKS_HOST_PROD }}
      TARGET: ${{ github.event.inputs.target || github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Ensure .py files are Databricks notebooks
        shell: pwsh
        run: |
          Get-ChildItem -Path "${{ github.workspace }}" -Filter "*.py" -Recurse | ForEach-Object {
            ("# Databricks notebook source`n" + (Get-Content $_.FullName -Raw)) | Set-Content $_.FullName
          }

      - name: Create databricks.yml
        run: |
          cat <<'EOF' > databricks.yml
          bundle:
            name: pharma_dabs

          include:
            - src/*.yml
            - src/*/*.yml

          sync:
            exclude:
              - ".github"
              - "databricks.yml"

          targets:
            dev:
              mode: development
              default: true
              workspace:
                host: '${{ secrets.DATABRICKS_HOST_DEV }}'
                root_path: '/dbx'
              permissions:
                - user_name: sce21cs004@sairamtap.edu.in
                  level: CAN_RUN
                - service_principal_name: ${{ secrets.DATABRICKS_CLIENT_ID }}
                  level: CAN_MANAGE
            prod:
              mode: production
              workspace:
                host: '${{ secrets.DATABRICKS_HOST_PROD }}'
                root_path: '/dbx'
              permissions:
                - user_name: sce21cs004@sairamtap.edu.in
                  level: CAN_RUN
                - service_principal_name: ${{ secrets.DATABRICKS_CLIENT_ID }}
                  level: CAN_MANAGE
          EOF

      - name: Deploy bundle
        run: databricks bundle deploy -t ${{ env.TARGET }}